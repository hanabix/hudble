<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>HeadUp Fitness Prototype</title>
        <link
            rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0&family=Droid+Sans+Mono&display=swap"
        />
        <script src="https://cdn.tailwindcss.com"></script>
        <script>
            tailwind.config = {
                theme: {
                    extend: {
                        colors: {
                            'hud-green': '#40ff5e',
                            'hud-bg': '#000000',
                        },
                        fontFamily: {
                            mono: [
                                '"Droid Sans Mono"',
                                'monospace',
                            ],
                        },
                    },
                },
            }
        </script>
        <style>
            .material-symbols-rounded {
                font-family: "Material Symbols Rounded";
                font-weight: normal;
                font-style: normal;
                letter-spacing: normal;
                text-transform: none;
                display: inline-block;
                white-space: nowrap;
                word-wrap: normal;
                direction: ltr;
                -webkit-font-smoothing: antialiased;
                font-variation-settings:
                    "FILL" 0,
                    "wght" 400,
                    "GRAD" 0,
                    "opsz" 24;
            }
        </style>
    </head>
    <body class="m-0 min-h-screen grid place-items-center bg-[#111111] font-mono text-base leading-[22px]">
        <main class="relative w-[480px] h-[640px] bg-hud-bg text-hud-green overflow-hidden text-base leading-[22px]">
            <div class="absolute inset-x-0 top-[224px] flex justify-between items-start flex-nowrap">
                <div class="flex items-center gap-2 flex-1 justify-start whitespace-nowrap">
                    <span class="material-symbols-rounded" aria-hidden="true">timer</span>
                    <span class="text-right">6'21"</span>
                </div>
                <div class="flex items-center gap-2 flex-1 justify-center whitespace-nowrap">
                    <span class="material-symbols-rounded" aria-hidden="true">cardiology</span>
                    <span class="text-right">156</span>
                </div>
                <div class="flex items-center gap-2 flex-1 justify-end whitespace-nowrap">
                    <span class="material-symbols-rounded" aria-hidden="true">steps</span>
                    <span class="text-right">178</span>
                </div>
            </div>
            <div class="absolute inset-x-0 top-[520px] grid grid-cols-3 items-center">
                <div class="justify-self-start">15:47</div>
                <div class="justify-self-center">Enduro 2</div>
                <div class="justify-self-end">87%</div>
            </div>
        </main>
    </body>
</html>
