<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>HeadUp Fitness Prototype</title>
        <link
            rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0"
        />
        <style>
            :root {
                --hud-green: #40ff5e;
                --bg: #000000;
            }

            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                min-height: 100vh;
                display: grid;
                place-items: center;
                background: #111111;
                font-family:
                    "Andale Mono", "SFMono-Regular", "Consolas", monospace;
                font-size: 16px;
                line-height: 22px;
            }

            .screen {
                position: relative;
                width: 480px;
                height: 640px;
                background: var(--bg);
                color: var(--hud-green);
                overflow: hidden;
                font-size: 16px;
                line-height: 22px;
            }

            .stats-row {
                position: absolute;
                left: 0;
                right: 0;
                top: 224px;
                display: flex;
                justify-content: space-between;
                align-items: flex-start;
                flex-wrap: nowrap;
            }

            .stat {
                display: flex;
                align-items: center;
                gap: 4px;
                flex: 0 0 auto;
                white-space: nowrap;
            }

            .reading-value {
                display: inline-block;
                width: auto;
                text-align: left;
            }

            .pace .reading-value {
                width: 48px;
            }

            .metric .reading-value,
            .cadence .reading-value {
                width: 24px;
            }

            .distance .reading-value {
                width: 64px;
                white-space: nowrap;
            }

            svg {
                width: 20px;
                height: 20px;
                fill: var(--hud-green);
                flex: 0 0 auto;
            }

            .material-symbols-rounded {
                font-family: "Material Symbols Rounded";
                font-weight: normal;
                font-style: normal;
                letter-spacing: normal;
                text-transform: none;
                display: inline-block;
                white-space: nowrap;
                word-wrap: normal;
                direction: ltr;
                -webkit-font-smoothing: antialiased;
                font-variation-settings:
                    "FILL" 0,
                    "wght" 400,
                    "GRAD" 0,
                    "opsz" 24;
            }

            .footer {
                position: absolute;
                left: 0;
                right: 0;
                top: 520px;
                display: grid;
                grid-template-columns: 1fr 1fr 1fr;
                align-items: center;
            }

            .device {
                justify-self: center;
            }

            .time {
                justify-self: start;
            }

            .battery {
                justify-self: end;
            }
        </style>
    </head>
    <body>
        <main class="screen">
            <div class="stats-row">
                <div class="stat pace">
                    <span class="material-symbols-rounded" aria-hidden="true"
                        >timer</span
                    >
                    <span class="reading-value">6'21"</span>
                </div>
                <div class="stat metric">
                    <span class="material-symbols-rounded" aria-hidden="true"
                        >cardiology</span
                    >
                    <span class="reading-value">156</span>
                </div>
                <div class="stat cadence">
                    <span class="material-symbols-rounded" aria-hidden="true"
                        >steps</span
                    >
                    <span class="reading-value">178</span>
                </div>
                <div class="stat distance">
                    <span class="material-symbols-rounded" aria-hidden="true"
                        >distance</span
                    >
                    <span class="reading-value">5.43km</span>
                </div>
            </div>
            <div class="footer">
                <div class="time">15:47</div>
                <div class="device">Enduro 2</div>
                <div class="battery">87%</div>
            </div>
        </main>
    </body>
</html>
