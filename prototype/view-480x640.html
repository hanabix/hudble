<!doctype html>
<html lang="zh-CN">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>HeadUp Fitness Prototype</title>
        <link
            rel="stylesheet"
            href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,0,0"
        />
        <style>
            :root {
                --hud-green: #40FF5E;
                --bg: #000000;
            }

            * {
                box-sizing: border-box;
            }

            body {
                margin: 0;
                min-height: 100vh;
                display: grid;
                place-items: center;
                background: #111111;
                font-family:
                    "Andale Mono", "SFMono-Regular", "Consolas", monospace;
                font-size: 16px;
                line-height: 22px;
            }

            .screen {
                position: relative;
                width: 480px;
                height: 640px;
                background: var(--bg);
                color: var(--hud-green);
                overflow: hidden;
                font-size: 16px;
                line-height: 22px;
            }

            .metric,
            .pace,
            .cadence {
                position: absolute;
                left: 0;
                display: flex;
                align-items: center;
                gap: 4px;
                width: 240px;
            }

            .metric {
                top: 224px;
            }

            .heart-value {
                display: flex;
                align-items: baseline;
                gap: 10px;
            }

            .reading-value {
                display: inline-block;
                width: 72px;
                text-align: right;
            }

            .reading-unit {
                display: inline-block;
                font-family:
                    "Andale Mono", "SFMono-Regular", "Consolas", monospace;
            }

            svg {
                width: 20px;
                height: 20px;
                fill: var(--hud-green);
                flex: 0 0 auto;
            }

            .pace {
                top: 184px;
            }

            .cadence {
                top: 264px;
            }

            .material-symbols-rounded {
                font-family: "Material Symbols Rounded";
                font-weight: normal;
                font-style: normal;
                letter-spacing: normal;
                text-transform: none;
                display: inline-block;
                white-space: nowrap;
                word-wrap: normal;
                direction: ltr;
                -webkit-font-smoothing: antialiased;
                font-variation-settings:
                    "FILL" 0,
                    "wght" 400,
                    "GRAD" 0,
                    "opsz" 24;
            }

            .footer {
                position: absolute;
                left: 0;
                right: 0;
                top: 520px;
                display: grid;
                grid-template-columns: 1fr 1fr 1fr;
                align-items: center;
            }

            .device {
                justify-self: center;
            }

            .distance,
            .duration,
            .battery {
                position: absolute;
                right: 0;
                text-align: right;
                width: 240px;
            }

            .distance {
                top: 184px;
            }

            .duration {
                top: 224px;
            }

            .time {
                justify-self: start;
            }

            .battery {
                justify-self: end;
            }
        </style>
    </head>
    <body>
        <main class="screen">
            <div class="metric">
                <span class="material-symbols-rounded" aria-hidden="true"
                    >cardiology</span
                >
                <span class="heart-value">
                    <span class="reading-value">156</span>
                    <span class="reading-unit">bpm</span>
                </span>
            </div>

            <div class="pace">
                <span class="material-symbols-rounded" aria-hidden="true"
                    >timer</span
                >
                <span class="heart-value">
                    <span class="reading-value">6'21"</span>
                    <span class="reading-unit">/km</span>
                </span>
            </div>
            <div class="cadence">
                <span class="material-symbols-rounded" aria-hidden="true"
                    >steps</span
                >
                <span class="heart-value">
                    <span class="reading-value">178</span>
                    <span class="reading-unit">spm</span>
                </span>
            </div>
            <div class="distance">5.43 km</div>
            <div class="duration">00:36:18</div>
            <div class="footer">
                <div class="time">15:47:23</div>
                <div class="device">Enduro 2</div>
                <div class="battery">87%</div>
            </div>
        </main>
    </body>
</html>
