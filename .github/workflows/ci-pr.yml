name: Android CI PR

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Android Environment
        uses: ./.github/actions/android-setup

      - name: Run tests
        run: ./gradlew testDebugUnitTest
